version: "3.8"

services:
  postgres:
    image: postgres:16-alpine
    container_name: halo-yoga-db
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: haloyoga
      POSTGRES_PASSWORD: haloyoga_dev
      POSTGRES_DB: haloyoga
    volumes:
      - postgres_data:/var/lib/postgresql/data

  adminer:
    image: adminer:latest
    container_name: halo-yoga-adminer
    restart: unless-stopped
    ports:
      - "8080:8080"
    depends_on:
      - postgres

volumes:
  postgres_data:
