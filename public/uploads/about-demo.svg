<svg xmlns="http://www.w3.org/2000/svg" width="600" height="800" viewBox="0 0 600 800">
  <defs>
    <linearGradient id="aboutGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#c7d8c7;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e8f0e8;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="600" height="800" rx="16" fill="url(#aboutGrad)"/>
  <!-- Person silhouette -->
  <g transform="translate(300,350)" opacity="0.3">
    <circle cx="0" cy="-100" r="70" fill="#566668"/>
    <ellipse cx="0" cy="50" rx="90" ry="120" fill="#566668"/>
  </g>
  <!-- Yoga pose hint -->
  <g transform="translate(300,600)" opacity="0.15">
    <text font-family="Arial" font-size="120" fill="#566668" text-anchor="middle" dominant-baseline="middle">🧘</text>
  </g>
  <!-- Border decoration -->
  <rect x="20" y="20" width="560" height="760" rx="12" fill="none" stroke="#566668" stroke-width="1" opacity="0.1"/>
</svg>